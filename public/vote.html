<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crowdpick — Votá</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; text-align: center; }
    p.subtitle { font-size: 0.9rem; color: #aaa; margin-bottom: 30px; text-align: center; }
    .options { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      background: #222;
      border: 2px solid #333;
      color: #fff;
      padding: 18px 20px;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .option-title { font-weight: 600; }
    .option-sub { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
    #thanks { display: none; text-align: center; }
    #thanks h2 { font-size: 1.6rem; margin-bottom: 10px; }
    #thanks p { color: #aaa; margin-top: 8px; }
    #winner-announcement {
      display: none;
      margin-top: 30px;
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      border: 2px solid;
    }
    #winner-announcement .label { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
    #winner-announcement .name { font-size: 2rem; font-weight: 700; }
    #winner-announcement .trophy { font-size: 2.5rem; margin-bottom: 10px; }
    #waiting { text-align: center; }
    #waiting h2 { font-size: 1.4rem; color: #aaa; }
    #waiting p { color: #555; margin-top: 10px; font-size: 0.85rem; }
    .powered {
      position: fixed;
      bottom: 14px;
      right: 20px;
      font-size: 0.7rem;
      color: #2a2a2a;
    }
  </style>
</head>
<body>
  <div id="waiting">
    <h2 id="waiting-title">🎵 Crowdpick</h2>
    <p id="waiting-subtitle">Esperando la próxima votación...</p>
  </div>

  <div id="poll-section" style="display:none; width:100%; max-width:400px;">
    <h1 id="poll-title"></h1>
    <p class="subtitle">Elegí una opción</p>
    <div class="options" id="options-container"></div>
  </div>

  <div id="thanks">
    <h2 id="thanks-title">✅ ¡Voto registrado!</h2>
    <p>Mirá la pantalla grande para ver los resultados en vivo</p>
  </div>

  <div id="winner-announcement">
    <div class="trophy">🏆</div>
    <div class="label">¡El ganador es...</div>
    <div class="name" id="winner-name"></div>
  </div>

  <div class="powered">Powered by Crowdpick</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let pollId = null;
    let voted = false;
    let currentPoll = null;
    let PRIMARY_COLOR = '#6C63FF';

    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        PRIMARY_COLOR = cfg.primaryColor;
        applyTheme();
      });

    function applyTheme() {
      document.getElementById('waiting-title').style.color = PRIMARY_COLOR;
      document.getElementById('thanks-title').style.color = PRIMARY_COLOR;
      document.getElementById('winner-announcement').style.borderColor = PRIMARY_COLOR;
      document.getElementById('winner-announcement').style.background = PRIMARY_COLOR + '22';
      document.getElementById('winner-announcement').querySelector('.name').style.color = PRIMARY_COLOR;
    }

    function showWaiting() {
      document.getElementById('poll-section').style.display = 'none';
      document.getElementById('thanks').style.display = 'none';
      document.getElementById('winner-announcement').style.display = 'none';
      document.getElementById('waiting').style.display = 'block';
    }

    // Actualizar pantalla de espera desde admin en tiempo real
    socket.on('update-waiting', ({ title, subtitle }) => {
      if (title !== undefined) document.getElementById('waiting-title').textContent = title || '🎵 Crowdpick';
      if (subtitle !== undefined) document.getElementById('waiting-subtitle').textContent = subtitle || 'Esperando la próxima votación...';
    });

    socket.on('poll-update', ({ poll, votes }) => {
      currentPoll = poll;
      pollId = poll.id || poll.title;
      const key = 'voted_' + pollId;
      document.getElementById('winner-announcement').style.display = 'none';

      if (localStorage.getItem(key)) {
        voted = true;
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('poll-section').style.display = 'none';
        document.getElementById('thanks').style.display = 'block';
        return;
      }

      voted = false;
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('thanks').style.display = 'none';
      document.getElementById('poll-section').style.display = 'block';
      document.getElementById('poll-title').textContent = poll.title;
      document.getElementById('poll-title').style.color = PRIMARY_COLOR;

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      poll.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `
          <div class="option-title">${opt.name}</div>
          ${opt.description ? `<div class="option-sub">${opt.description}</div>` : ''}
        `;
        btn.onmouseover = () => { btn.style.borderColor = PRIMARY_COLOR; btn.style.background = '#1a1a1a'; };
        btn.onmouseout = () => { btn.style.borderColor = '#333'; btn.style.background = '#222'; };
        btn.onclick = () => castVote(opt.id);
        container.appendChild(btn);
      });
    });

    socket.on('show-winner', ({ winnerId, poll }) => {
      if (!poll) return;
      const winner = poll.options.find(o => o.id === winnerId);
      if (!winner) return;
      document.getElementById('winner-name').textContent = winner.name;
      document.getElementById('poll-section').style.display = 'none';
      document.getElementById('thanks').style.display = 'none';
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('winner-announcement').style.display = 'block';
    });

    // Reinicio forzado: limpia localStorage y vuelve a waiting sin importar el estado anterior
    socket.on('go-home', () => {
      voted = false;
      if (pollId) localStorage.removeItem('voted_' + pollId);
      pollId = null;
      currentPoll = null;
      showWaiting();
    });

    function castVote(optionId) {
      if (voted) return;
      voted = true;
      localStorage.setItem('voted_' + pollId, '1');
      socket.emit('vote', optionId);
      document.getElementById('poll-section').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    }
  </script>
</body>
</html>
