<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crowdpick — Votá</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.4s, color 0.4s;
    }
    .logo-container { margin-bottom: 20px; display: none; }
    .logo-container img { max-height: 70px; max-width: 200px; object-fit: contain; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; text-align: center; }
    p.subtitle { font-size: 0.9rem; margin-bottom: 30px; text-align: center; transition: color 0.4s; }
    .options { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      background: #222;
      border: 2px solid #333;
      color: #fff;
      padding: 18px 20px;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .option-title { font-weight: 600; }
    .option-sub { font-size: 0.8rem; margin-top: 4px; transition: color 0.4s; }
    #thanks { display: none; text-align: center; }
    #thanks h2 { font-size: 1.6rem; margin-bottom: 10px; }
    #thanks p { margin-top: 8px; transition: color 0.4s; }
    #winner-announcement {
      display: none;
      margin-top: 30px;
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      border: 2px solid;
    }
    #winner-announcement .label { font-size: 0.85rem; margin-bottom: 8px; transition: color 0.4s; }
    #winner-announcement .name { font-size: 2rem; font-weight: 700; }
    #winner-announcement .trophy { font-size: 2.5rem; margin-bottom: 10px; }
    #waiting { text-align: center; }
    #waiting h2 { font-size: 1.4rem; }
    #waiting p { margin-top: 10px; font-size: 0.85rem; transition: color 0.4s; }
    .powered { position: fixed; bottom: 14px; right: 20px; font-size: 0.7rem; color: #2a2a2a; }
  </style>
</head>
<body>
  <div id="waiting">
    <div class="logo-container" id="waiting-logo"><img id="waiting-logo-img" src="" alt="Logo"></div>
    <h2 id="waiting-title">🎵 Crowdpick</h2>
    <p id="waiting-subtitle">Esperando la próxima votación...</p>
  </div>

  <div id="poll-section" style="display:none; width:100%; max-width:400px; display:none; flex-direction:column; align-items:center;">
    <div class="logo-container" id="poll-logo"><img id="poll-logo-img" src="" alt="Logo"></div>
    <h1 id="poll-title"></h1>
    <p class="subtitle" id="poll-subtitle">Elegí una opción</p>
    <div class="options" id="options-container"></div>
  </div>

  <div id="thanks">
    <div class="logo-container" id="thanks-logo"><img id="thanks-logo-img" src="" alt="Logo"></div>
    <h2 id="thanks-title">✅ ¡Voto registrado!</h2>
    <p id="thanks-sub">Mirá la pantalla grande para ver los resultados en vivo</p>
  </div>

  <div id="winner-announcement">
    <div class="trophy">🏆</div>
    <div class="label" id="winner-label">¡El ganador es...</div>
    <div class="name" id="winner-name"></div>
  </div>

  <div class="powered">Powered by Crowdpick</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let pollId = null;
    let voted = false;
    let currentPoll = null;
    let appearance = {
      bgColor: '#111111', textColor: '#ffffff',
      accentColor: '#6C63FF', subtitleColor: '#aaaaaa',
      font: 'Inter', logoUrl: ''
    };

    // Cargar Google Fonts
    const fontLink = document.createElement('link');
    fontLink.rel = 'stylesheet';
    fontLink.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Oswald:wght@400;600;700&family=Poppins:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&family=Bebas+Neue&display=swap';
    document.head.appendChild(fontLink);

    fetch('/api/config').then(r => r.json()).then(cfg => {
      appearance.accentColor = cfg.primaryColor;
      applyAppearance();
    });

    socket.on('appearance-update', (data) => {
      appearance = { ...appearance, ...data };
      applyAppearance();
    });

    function applyAppearance() {
      document.body.style.background = appearance.bgColor;
      document.body.style.color = appearance.textColor;
      document.body.style.fontFamily = `'${appearance.font}', sans-serif`;

      document.getElementById('waiting-title').style.color = appearance.accentColor;
      document.getElementById('waiting-subtitle').style.color = appearance.subtitleColor;
      document.getElementById('waiting-subtitle').style.color = appearance.subtitleColor;
      document.getElementById('thanks-title').style.color = appearance.accentColor;
      document.getElementById('thanks-sub').style.color = appearance.subtitleColor;
      document.getElementById('winner-label').style.color = appearance.subtitleColor;
      document.getElementById('winner-name').style.color = appearance.accentColor;
      document.getElementById('winner-announcement').style.borderColor = appearance.accentColor;
      document.getElementById('winner-announcement').style.background = appearance.accentColor + '22';

      // Logo en todas las secciones
      const logos = ['waiting-logo', 'poll-logo', 'thanks-logo'];
      const logoImgs = ['waiting-logo-img', 'poll-logo-img', 'thanks-logo-img'];
      logos.forEach((id, i) => {
        const container = document.getElementById(id);
        const img = document.getElementById(logoImgs[i]);
        if (appearance.logoUrl) {
          img.src = appearance.logoUrl;
          container.style.display = 'block';
        } else {
          container.style.display = 'none';
        }
      });

      // Actualizar botones de opciones si existen
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.style.color = appearance.textColor;
        btn.style.background = appearance.bgColor === '#ffffff' ? '#f5f5f5' : '#222';
      });
      document.querySelectorAll('.option-sub').forEach(el => el.style.color = appearance.subtitleColor);
    }

    socket.on('update-waiting', ({ title, subtitle }) => {
      if (title !== undefined) document.getElementById('waiting-title').textContent = title || '🎵 Crowdpick';
      if (subtitle !== undefined) document.getElementById('waiting-subtitle').textContent = subtitle || 'Esperando la próxima votación...';
    });

    function showWaiting() {
      document.getElementById('poll-section').style.display = 'none';
      document.getElementById('thanks').style.display = 'none';
      document.getElementById('winner-announcement').style.display = 'none';
      document.getElementById('waiting').style.display = 'block';
    }

    socket.on('poll-update', ({ poll }) => {
      currentPoll = poll;
      pollId = poll.id || poll.title;
      const key = 'voted_' + pollId;
      document.getElementById('winner-announcement').style.display = 'none';

      if (localStorage.getItem(key)) {
        voted = true;
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('poll-section').style.display = 'none';
        document.getElementById('thanks').style.display = 'block';
        return;
      }

      voted = false;
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('thanks').style.display = 'none';
      document.getElementById('poll-section').style.display = 'flex';
      document.getElementById('poll-title').textContent = poll.title;
      document.getElementById('poll-title').style.color = appearance.accentColor;
      document.getElementById('poll-subtitle').style.color = appearance.subtitleColor;

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      poll.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.style.color = appearance.textColor;
        btn.innerHTML = `
          <div class="option-title">${opt.name}</div>
          ${opt.description ? `<div class="option-sub" style="color:${appearance.subtitleColor}">${opt.description}</div>` : ''}
        `;
        btn.onmouseover = () => { btn.style.borderColor = appearance.accentColor; };
        btn.onmouseout = () => { btn.style.borderColor = '#333'; };
        btn.onclick = () => castVote(opt.id);
        container.appendChild(btn);
      });
    });

    socket.on('show-winner', ({ winnerId, poll }) => {
      if (!poll) return;
      const winner = poll.options.find(o => o.id === winnerId);
      if (!winner) return;
      document.getElementById('winner-name').textContent = winner.name;
      document.getElementById('poll-section').style.display = 'none';
      document.getElementById('thanks').style.display = 'none';
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('winner-announcement').style.display = 'block';
    });

    socket.on('go-home', () => {
      voted = false;
      if (pollId) localStorage.removeItem('voted_' + pollId);
      pollId = null;
      currentPoll = null;
      showWaiting();
    });

    function castVote(optionId) {
      if (voted) return;
      voted = true;
      localStorage.setItem('voted_' + pollId, '1');
      socket.emit('vote', optionId);
      document.getElementById('poll-section').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    }
  </script>
</body>
</html>
