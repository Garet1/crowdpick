<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crowdpick — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 30px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 1.6rem; margin-bottom: 6px; }
    p.sub { color: #555; font-size: 0.85rem; margin-bottom: 30px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; margin-top: 16px; }
    input[type="text"], input[type="password"], input[type="url"], select {
      width: 100%;
      background: #222;
      border: 1px solid #333;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent, #6C63FF); }
    select { cursor: pointer; }
    select option { background: #222; }

    /* Collapsible */
    .collapsible {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .collapsible-header:hover { background: #222; }
    .collapsible-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
    }
    .collapsible-arrow {
      font-size: 0.8rem;
      color: #555;
      transition: transform 0.25s;
    }
    .collapsible.open .collapsible-arrow { transform: rotate(180deg); }
    .collapsible-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid #2a2a2a;
    }
    .collapsible.open .collapsible-body { display: block; }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-row input[type="color"] {
      width: 44px;
      height: 44px;
      padding: 2px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #222;
      cursor: pointer;
      flex-shrink: 0;
    }
    .color-row input[type="text"] { flex: 1; }

    .logo-tabs {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      margin-bottom: 12px;
    }
    .logo-tab {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .logo-tab.active { border-color: var(--accent, #6C63FF); color: var(--accent, #6C63FF); background: #1a1a2a; }
    .logo-panel { display: none; }
    .logo-panel.active { display: block; }
    .logo-preview {
      margin-top: 12px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-preview img { max-height: 60px; max-width: 100%; border-radius: 6px; object-fit: contain; }
    .logo-preview span { color: #444; font-size: 0.85rem; }
    .file-upload-btn {
      background: #222;
      border: 1px dashed #444;
      color: #aaa;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 0.9rem;
      text-align: center;
      display: block;
      margin-top: 8px;
    }
    .file-upload-btn:hover { border-color: var(--accent, #6C63FF); color: var(--accent, #6C63FF); }
    .font-preview {
      margin-top: 8px;
      padding: 10px 14px;
      background: #111;
      border-radius: 8px;
      font-size: 1.1rem;
      color: #fff;
      text-align: center;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin: 24px 0 12px;
    }
    .option-block {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      margin-top: 12px;
    }
    .option-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .option-block h3 { font-size: 0.9rem; }
    .btn-remove {
      background: transparent;
      border: 1px solid #3a2a2a;
      color: #c0392b;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .btn-remove:hover { background: #3a1a1a; }
    .btn {
      margin-top: 12px;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-red { background: #c0392b; color: #fff; }
    .btn-red:hover { background: #a93226; }
    .btn-gray { background: #333; color: #fff; }
    .btn-gray:hover { background: #444; }
    .btn-outline {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .btn-outline:hover { border-color: var(--accent, #6C63FF); color: var(--accent, #6C63FF); }
    .btn-outline-danger {
      background: transparent;
      border: 1px solid #3a2a2a;
      color: #c0392b;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .btn-outline-danger:hover { background: #3a1a1a; }
    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
      border-left: 4px solid;
    }
    .status.active { display: block; }
    #add-option-btn {
      background: transparent;
      border: 1px dashed #444;
      color: #aaa;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
      font-size: 0.9rem;
    }
    #add-option-btn:hover { color: var(--accent, #6C63FF); border-color: var(--accent, #6C63FF); }
    .divider { border: none; border-top: 1px solid #2a2a2a; margin: 24px 0; }
    .powered { text-align: center; font-size: 0.75rem; color: #333; margin-top: 40px; padding-bottom: 10px; }
    .powered span { color: #555; }
  </style>
</head>
<body>
  <h1>🎛️ Panel Admin</h1>
  <p class="sub" id="page-sub">Cargando...</p>

  <!-- APARIENCIA (desplegable) -->
  <div class="collapsible" id="collapse-appearance">
    <div class="collapsible-header" onclick="toggleCollapse('appearance')">
      <span class="collapsible-title">🎨 Apariencia</span>
      <span class="collapsible-arrow">▼</span>
    </div>
    <div class="collapsible-body">
      <label>Logo</label>
      <div class="logo-tabs">
        <button class="logo-tab active" onclick="switchLogoTab('url', this)">URL de imagen</button>
        <button class="logo-tab" onclick="switchLogoTab('file', this)">Subir archivo</button>
      </div>
      <div class="logo-panel active" id="logo-url-panel">
        <input type="url" id="logo-url-input" placeholder="https://ejemplo.com/logo.png">
      </div>
      <div class="logo-panel" id="logo-file-panel">
        <label class="file-upload-btn" for="logo-file-input">📁 Elegir imagen (JPG, PNG)</label>
        <input type="file" id="logo-file-input" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleFileUpload(this)">
      </div>
      <div class="logo-preview" id="logo-preview"><span>Sin logo</span></div>

      <label style="margin-top:16px">Color de fondo</label>
      <div class="color-row">
        <input type="color" id="bg-color-picker" value="#111111" oninput="syncColor('bg')">
        <input type="text" id="bg-color-text" value="#111111" oninput="syncColorText('bg')" placeholder="#111111">
      </div>

      <label>Color de texto principal</label>
      <div class="color-row">
        <input type="color" id="text-color-picker" value="#ffffff" oninput="syncColor('text')">
        <input type="text" id="text-color-text" value="#ffffff" oninput="syncColorText('text')" placeholder="#ffffff">
      </div>

      <label>Color de acento (botones, barras, highlights)</label>
      <div class="color-row">
        <input type="color" id="accent-color-picker" value="#6C63FF" oninput="syncColor('accent')">
        <input type="text" id="accent-color-text" value="#6C63FF" oninput="syncColorText('accent')" placeholder="#6C63FF">
      </div>

      <label>Color de subtítulos</label>
      <div class="color-row">
        <input type="color" id="subtitle-color-picker" value="#aaaaaa" oninput="syncColor('subtitle')">
        <input type="text" id="subtitle-color-text" value="#aaaaaa" oninput="syncColorText('subtitle')" placeholder="#aaaaaa">
      </div>

      <label>Tipografía</label>
      <select id="font-select" onchange="updateFontPreview()">
        <option value="Inter">Inter — moderna y limpia</option>
        <option value="Playfair Display">Playfair Display — elegante serif</option>
        <option value="Oswald">Oswald — compacta e impactante</option>
        <option value="Poppins">Poppins — redonda y amigable</option>
        <option value="Space Grotesk">Space Grotesk — tecnológica</option>
        <option value="Bebas Neue">Bebas Neue — display llamativo</option>
      </select>
      <div class="font-preview" id="font-preview">Así se ve este texto con la tipografía elegida</div>

      <button class="btn-outline" onclick="applyAppearance()">✓ Aplicar apariencia</button>
      <button class="btn-outline-danger" onclick="resetAppearance()">↺ Restaurar por defecto</button>
    </div>
  </div>

  <!-- PANTALLA DE ESPERA (desplegable) -->
  <div class="collapsible" id="collapse-waiting">
    <div class="collapsible-header" onclick="toggleCollapse('waiting')">
      <span class="collapsible-title">⏳ Pantalla de espera</span>
      <span class="collapsible-arrow">▼</span>
    </div>
    <div class="collapsible-body">
      <label>Título</label>
      <input type="text" id="waiting-title" placeholder="Ej: 🎵 Bienvenidos">
      <label>Subtítulo</label>
      <input type="text" id="waiting-subtitle" placeholder="Ej: La votación comenzará en breve...">
      <button class="btn-outline" onclick="updateWaiting()">↺ Actualizar pantalla de espera</button>
    </div>
  </div>

  <!-- VOTACIÓN -->
  <p class="section-title">Votación</p>
  <label>Título de la votación</label>
  <input type="text" id="poll-title" placeholder="Ej: ¿Qué suena ahora?">

  <div id="options-list">
    <div class="option-block">
      <div class="option-block-header"><h3 class="accent">Opción 1</h3></div>
      <label>Título <span style="color:#555">(requerido)</span></label>
      <input type="text" class="opt-name" placeholder="Ej: Rock Nacional">
      <label>Subtítulo <span style="color:#555">(opcional)</span></label>
      <input type="text" class="opt-desc" placeholder="Ej: Soda, Divididos, Los Redondos">
    </div>
    <div class="option-block">
      <div class="option-block-header"><h3 class="accent">Opción 2</h3></div>
      <label>Título <span style="color:#555">(requerido)</span></label>
      <input type="text" class="opt-name" placeholder="Ej: Electrónica">
      <label>Subtítulo <span style="color:#555">(opcional)</span></label>
      <input type="text" class="opt-desc" placeholder="Ej: House, Tech House, Minimal">
    </div>
    <div class="option-block">
      <div class="option-block-header">
        <h3 class="accent">Opción 3</h3>
        <button class="btn-remove" onclick="removeOption(this)">✕ Eliminar</button>
      </div>
      <label>Título <span style="color:#555">(requerido)</span></label>
      <input type="text" class="opt-name" placeholder="Ej: Reggaeton">
      <label>Subtítulo <span style="color:#555">(opcional)</span></label>
      <input type="text" class="opt-desc" placeholder="Ej: Bad Bunny, Karol G">
    </div>
  </div>

  <button id="add-option-btn">+ Agregar opción</button>
  <hr class="divider">

  <div id="phase-launch">
    <button class="btn btn-primary" onclick="startPoll()">🚀 Lanzar votación</button>
  </div>
  <div id="phase-active" style="display:none">
    <button class="btn btn-red" onclick="endPoll()">⛔ Cerrar votación y mostrar ganador</button>
  </div>
  <div id="phase-winner" style="display:none">
    <button class="btn btn-gray" onclick="resetDisplay()">🔄 Volver a pantalla de espera</button>
  </div>

  <div class="status" id="status"></div>
  <div class="powered">Powered by <span>Crowdpick</span></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const FONTS = ['Inter','Playfair Display','Oswald','Poppins','Space Grotesk','Bebas Neue'];
    let PRIMARY_COLOR = '#6C63FF';
    let VENUE_NAME = 'Crowdpick';
    let optionCount = 3;
    let logoBase64 = '';
    let currentLogoTab = 'url';

    const fontLink = document.createElement('link');
    fontLink.rel = 'stylesheet';
    fontLink.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Oswald:wght@400;600;700&family=Poppins:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&family=Bebas+Neue&display=swap';
    document.head.appendChild(fontLink);

    fetch('/api/config').then(r => r.json()).then(cfg => {
      PRIMARY_COLOR = cfg.primaryColor;
      VENUE_NAME = cfg.venueName;
      applyTheme();
    });

    socket.on('appearance-update', (data) => {
      loadAppearanceIntoForm(data);
    });

    function toggleCollapse(id) {
      const el = document.getElementById('collapse-' + id);
      el.classList.toggle('open');
    }

    function loadAppearanceIntoForm(data) {
      if (data.bgColor) { document.getElementById('bg-color-picker').value = data.bgColor; document.getElementById('bg-color-text').value = data.bgColor; }
      if (data.textColor) { document.getElementById('text-color-picker').value = data.textColor; document.getElementById('text-color-text').value = data.textColor; }
      if (data.accentColor) { document.getElementById('accent-color-picker').value = data.accentColor; document.getElementById('accent-color-text').value = data.accentColor; }
      if (data.subtitleColor) { document.getElementById('subtitle-color-picker').value = data.subtitleColor; document.getElementById('subtitle-color-text').value = data.subtitleColor; }
      if (data.font) { document.getElementById('font-select').value = data.font; updateFontPreview(); }
      if (data.logoUrl) {
        logoBase64 = '';
        document.getElementById('logo-url-input').value = data.logoUrl;
        showLogoPreview(data.logoUrl);
      }
    }

    function applyTheme() {
      document.documentElement.style.setProperty('--accent', PRIMARY_COLOR);
      document.getElementById('page-sub').textContent = VENUE_NAME + ' — Control de votaciones';
      document.querySelectorAll('.accent').forEach(el => el.style.color = PRIMARY_COLOR);
      const btnPrimary = document.querySelector('.btn-primary');
      if (btnPrimary) { btnPrimary.style.background = PRIMARY_COLOR; btnPrimary.style.color = '#000'; }
      document.getElementById('accent-color-picker').value = PRIMARY_COLOR;
      document.getElementById('accent-color-text').value = PRIMARY_COLOR;
    }

    function switchLogoTab(tab, btn) {
      currentLogoTab = tab;
      document.querySelectorAll('.logo-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('logo-url-panel').classList.toggle('active', tab === 'url');
      document.getElementById('logo-file-panel').classList.toggle('active', tab === 'file');
    }

    function handleFileUpload(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => { logoBase64 = e.target.result; showLogoPreview(logoBase64); };
      reader.readAsDataURL(file);
    }

    document.getElementById('logo-url-input').addEventListener('input', (e) => {
      logoBase64 = '';
      showLogoPreview(e.target.value);
    });

    function showLogoPreview(src) {
      const preview = document.getElementById('logo-preview');
      if (src) {
        preview.innerHTML = `<img src="${src}" alt="Logo" onerror="this.parentElement.innerHTML='<span>No se pudo cargar la imagen</span>'">`;
      } else {
        preview.innerHTML = '<span>Sin logo</span>';
      }
    }

    function syncColor(type) {
      const val = document.getElementById(`${type}-color-picker`).value;
      document.getElementById(`${type}-color-text`).value = val;
    }
    function syncColorText(type) {
      let val = document.getElementById(`${type}-color-text`).value;
      if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
        document.getElementById(`${type}-color-picker`).value = val;
      }
    }

    function updateFontPreview() {
      const font = document.getElementById('font-select').value;
      document.getElementById('font-preview').style.fontFamily = `'${font}', sans-serif`;
    }

    function applyAppearance() {
      const logoUrl = logoBase64 || document.getElementById('logo-url-input').value.trim();
      const data = {
        bgColor: document.getElementById('bg-color-text').value || '#111111',
        textColor: document.getElementById('text-color-text').value || '#ffffff',
        accentColor: document.getElementById('accent-color-text').value || PRIMARY_COLOR,
        subtitleColor: document.getElementById('subtitle-color-text').value || '#aaaaaa',
        font: document.getElementById('font-select').value,
        logoUrl
      };
      socket.emit('update-appearance', data);
      showStatus('✅ Apariencia aplicada en todas las pantallas.', true);
    }

    function resetAppearance() {
      socket.emit('reset-appearance');
      logoBase64 = '';
      document.getElementById('logo-url-input').value = '';
      showLogoPreview('');
      showStatus('↺ Apariencia restaurada por defecto.', false);
    }

    function updateWaiting() {
      socket.emit('update-waiting', {
        title: document.getElementById('waiting-title').value,
        subtitle: document.getElementById('waiting-subtitle').value
      });
      showStatus('✅ Pantalla de espera actualizada.', true);
    }

    function removeOption(btn) {
      btn.closest('.option-block').remove();
      renumberOptions();
    }

    function renumberOptions() {
      const blocks = document.querySelectorAll('.option-block');
      blocks.forEach((block, i) => {
        const h3 = block.querySelector('h3');
        if (h3) h3.textContent = 'Opción ' + (i + 1);
        const removeBtn = block.querySelector('.btn-remove');
        if (blocks.length <= 2) {
          if (removeBtn) removeBtn.remove();
        } else if (i >= 2 && !removeBtn) {
          const header = block.querySelector('.option-block-header');
          const btn = document.createElement('button');
          btn.className = 'btn-remove';
          btn.textContent = '✕ Eliminar';
          btn.onclick = () => removeOption(btn);
          header.appendChild(btn);
        }
      });
      optionCount = blocks.length;
    }

    document.getElementById('add-option-btn').onclick = () => {
      optionCount++;
      const block = document.createElement('div');
      block.className = 'option-block';
      block.innerHTML = `
        <div class="option-block-header">
          <h3 class="accent" style="color:${PRIMARY_COLOR}">Opción ${optionCount}</h3>
          <button class="btn-remove" onclick="removeOption(this)">✕ Eliminar</button>
        </div>
        <label>Título <span style="color:#555">(requerido)</span></label>
        <input type="text" class="opt-name" placeholder="">
        <label>Subtítulo <span style="color:#555">(opcional)</span></label>
        <input type="text" class="opt-desc" placeholder="">
      `;
      document.getElementById('options-list').appendChild(block);
      renumberOptions();
    };

    function setPhase(phase) {
      document.getElementById('phase-launch').style.display = phase === 'launch' ? 'block' : 'none';
      document.getElementById('phase-active').style.display = phase === 'active' ? 'block' : 'none';
      document.getElementById('phase-winner').style.display = phase === 'winner' ? 'block' : 'none';
    }

    function startPoll() {
      const title = document.getElementById('poll-title').value.trim();
      const names = document.querySelectorAll('.opt-name');
      const descs = document.querySelectorAll('.opt-desc');
      const options = [];
      names.forEach((n, i) => {
        if (n.value.trim()) {
          options.push({ id: 'opt' + i, name: n.value.trim(), description: descs[i]?.value.trim() || '' });
        }
      });
      if (!title || options.length < 2) { showStatus('⚠️ Completá el título y al menos 2 opciones.', false); return; }
      socket.emit('start-poll', { title, options });
      setPhase('active');
      showStatus('✅ Votación lanzada: ' + title, true);
    }

    function endPoll() {
      socket.emit('end-poll');
      setPhase('winner');
      showStatus('🏆 Ganador mostrado en pantalla.', true);
    }

    function resetDisplay() {
      socket.emit('reset-display');
      setPhase('launch');
      showStatus('🔄 Pantalla de espera restaurada.', false);
    }

    function showStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status active';
      el.style.background = ok ? '#1a1a3a' : '#3a1a1a';
      el.style.borderLeftColor = ok ? PRIMARY_COLOR : '#c0392b';
    }

    updateFontPreview();
  </script>
</body>
</html>
