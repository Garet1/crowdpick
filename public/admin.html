<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crowdpick — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 30px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 1.6rem; margin-bottom: 6px; }
    p.sub { color: #555; font-size: 0.85rem; margin-bottom: 30px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; margin-top: 16px; }
    input {
      width: 100%;
      background: #222;
      border: 1px solid #333;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    input:focus { outline: none; border-color: var(--accent, #6C63FF); }
    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin: 28px 0 12px;
    }
    .option-block {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      margin-top: 12px;
      position: relative;
    }
    .option-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .option-block h3 { font-size: 0.9rem; }
    .btn-remove {
      background: transparent;
      border: 1px solid #3a2a2a;
      color: #c0392b;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .btn-remove:hover { background: #3a1a1a; }
    .btn {
      margin-top: 12px;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-red { background: #c0392b; color: #fff; }
    .btn-red:hover { background: #a93226; }
    .btn-gray { background: #333; color: #fff; }
    .btn-gray:hover { background: #444; }
    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
      border-left: 4px solid;
    }
    .status.active { display: block; }
    #add-option-btn {
      background: transparent;
      border: 1px dashed #444;
      color: #aaa;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
      font-size: 0.9rem;
    }
    #add-option-btn:hover { color: var(--accent, #6C63FF); border-color: var(--accent, #6C63FF); }
    .divider { border: none; border-top: 1px solid #2a2a2a; margin: 24px 0; }
    .powered {
      text-align: center;
      font-size: 0.75rem;
      color: #333;
      margin-top: 40px;
      padding-bottom: 10px;
    }
    .powered span { color: #555; }
  </style>
</head>
<body>
  <h1 id="page-title">🎛️ Panel Admin</h1>
  <p class="sub" id="page-sub">Cargando...</p>

  <p class="section-title">Pantalla de espera</p>
  <label>Título</label>
  <input type="text" id="waiting-title" placeholder="Ej: 🎵 Bienvenidos">
  <label>Subtítulo</label>
  <input type="text" id="waiting-subtitle" placeholder="Ej: La votación comenzará en breve...">

  <p class="section-title">Votación</p>
  <label>Título de la votación</label>
  <input type="text" id="poll-title" placeholder="Ej: ¿Qué suena ahora?">

  <div id="options-list">
    <div class="option-block">
      <div class="option-block-header">
        <h3 class="accent">Opción 1</h3>
      </div>
      <label>Título <span style="color:#555">(requerido)</span></label>
      <input type="text" class="opt-name" placeholder="Ej: Rock Nacional">
      <label>Subtítulo <span style="color:#555">(opcional)</span></label>
      <input type="text" class="opt-desc" placeholder="Ej: Soda, Divididos, Los Redondos">
    </div>
    <div class="option-block">
      <div class="option-block-header">
        <h3 class="accent">Opción 2</h3>
      </div>
      <label>Título <span style="color:#555">(requerido)</span></label>
      <input type="text" class="opt-name" placeholder="Ej: Electrónica">
      <label>Subtítulo <span style="color:#555">(opcional)</span></label>
      <input type="text" class="opt-desc" placeholder="Ej: House, Tech House, Minimal">
    </div>
    <div class="option-block">
      <div class="option-block-header">
        <h3 class="accent">Opción 3</h3>
        <button class="btn-remove" onclick="removeOption(this)">✕ Eliminar</button>
      </div>
      <label>Título <span style="color:#555">(requerido)</span></label>
      <input type="text" class="opt-name" placeholder="Ej: Reggaeton">
      <label>Subtítulo <span style="color:#555">(opcional)</span></label>
      <input type="text" class="opt-desc" placeholder="Ej: Bad Bunny, Karol G">
    </div>
  </div>

  <button id="add-option-btn">+ Agregar opción</button>
  <hr class="divider">

  <div id="phase-launch">
    <button class="btn btn-primary" onclick="startPoll()">🚀 Lanzar votación</button>
  </div>
  <div id="phase-active" style="display:none">
    <button class="btn btn-red" onclick="endPoll()">⛔ Cerrar votación y mostrar ganador</button>
  </div>
  <div id="phase-winner" style="display:none">
    <button class="btn btn-gray" onclick="resetDisplay()">🔄 Volver a pantalla de espera</button>
  </div>

  <div class="status" id="status"></div>

  <div class="powered">Powered by <span>Crowdpick</span></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let PRIMARY_COLOR = '#6C63FF';
    let VENUE_NAME = 'Crowdpick';
    let optionCount = 3;

    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        PRIMARY_COLOR = cfg.primaryColor;
        VENUE_NAME = cfg.venueName;
        applyTheme();
      });

    function applyTheme() {
      document.documentElement.style.setProperty('--accent', PRIMARY_COLOR);
      document.getElementById('page-sub').textContent = VENUE_NAME + ' — Control de votaciones';
      document.querySelectorAll('.accent').forEach(el => el.style.color = PRIMARY_COLOR);
      const btnPrimary = document.querySelector('.btn-primary');
      if (btnPrimary) {
        btnPrimary.style.background = PRIMARY_COLOR;
        btnPrimary.style.color = '#000';
      }
    }

    function removeOption(btn) {
      const block = btn.closest('.option-block');
      block.remove();
      renumberOptions();
    }

    function renumberOptions() {
      const blocks = document.querySelectorAll('.option-block');
      blocks.forEach((block, i) => {
        const h3 = block.querySelector('h3');
        if (h3) h3.textContent = 'Opción ' + (i + 1);
        // Mostrar botón eliminar solo si hay más de 2 opciones
        const removeBtn = block.querySelector('.btn-remove');
        if (blocks.length > 2) {
          if (!removeBtn && i > 1) {
            const header = block.querySelector('.option-block-header');
            const btn = document.createElement('button');
            btn.className = 'btn-remove';
            btn.textContent = '✕ Eliminar';
            btn.onclick = () => removeOption(btn);
            header.appendChild(btn);
          }
        } else {
          if (removeBtn) removeBtn.remove();
        }
      });
      optionCount = blocks.length;
    }

    document.getElementById('add-option-btn').onclick = () => {
      optionCount++;
      const block = document.createElement('div');
      block.className = 'option-block';
      block.innerHTML = `
        <div class="option-block-header">
          <h3 class="accent" style="color:${PRIMARY_COLOR}">Opción ${optionCount}</h3>
          <button class="btn-remove" onclick="removeOption(this)">✕ Eliminar</button>
        </div>
        <label>Título <span style="color:#555">(requerido)</span></label>
        <input type="text" class="opt-name" placeholder="">
        <label>Subtítulo <span style="color:#555">(opcional)</span></label>
        <input type="text" class="opt-desc" placeholder="">
      `;
      document.getElementById('options-list').appendChild(block);
      renumberOptions();
    };

    function setPhase(phase) {
      document.getElementById('phase-launch').style.display = phase === 'launch' ? 'block' : 'none';
      document.getElementById('phase-active').style.display = phase === 'active' ? 'block' : 'none';
      document.getElementById('phase-winner').style.display = phase === 'winner' ? 'block' : 'none';
    }

    function startPoll() {
      const title = document.getElementById('poll-title').value.trim();
      const names = document.querySelectorAll('.opt-name');
      const descs = document.querySelectorAll('.opt-desc');
      const waitingTitle = document.getElementById('waiting-title').value.trim();
      const waitingSubtitle = document.getElementById('waiting-subtitle').value.trim();

      const options = [];
      names.forEach((n, i) => {
        if (n.value.trim()) {
          options.push({
            id: 'opt' + i,
            name: n.value.trim(),
            description: descs[i]?.value.trim() || ''
          });
        }
      });

      if (!title || options.length < 2) {
        showStatus('⚠️ Completá el título y al menos 2 opciones.', false);
        return;
      }

      // Actualizar pantalla de espera antes de lanzar
      if (waitingTitle || waitingSubtitle) {
        socket.emit('update-waiting', { title: waitingTitle, subtitle: waitingSubtitle });
      }

      socket.emit('start-poll', { title, options });
      setPhase('active');
      showStatus('✅ Votación lanzada: ' + title, true);
    }

    function endPoll() {
      socket.emit('end-poll');
      setPhase('winner');
      showStatus('🏆 Ganador mostrado en pantalla.', true);
    }

    function resetDisplay() {
      socket.emit('reset-display');
      setPhase('launch');
      showStatus('🔄 Pantalla de espera restaurada.', false);
    }

    function showStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status active';
      el.style.background = ok ? '#1a1a3a' : '#3a1a1a';
      el.style.borderLeftColor = ok ? PRIMARY_COLOR : '#c0392b';
    }

    // Actualizar pantalla de espera en tiempo real mientras escribe
    document.getElementById('waiting-title').addEventListener('input', () => {
      socket.emit('update-waiting', {
        title: document.getElementById('waiting-title').value,
        subtitle: document.getElementById('waiting-subtitle').value
      });
    });
    document.getElementById('waiting-subtitle').addEventListener('input', () => {
      socket.emit('update-waiting', {
        title: document.getElementById('waiting-title').value,
        subtitle: document.getElementById('waiting-subtitle').value
      });
    });

    const socket = io();
  </script>
</body>
</html>
